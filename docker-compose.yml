version: '3.8'

services:
  web:
    build:
      context: ./rydex
      dockerfile: Dockerfile
    container_name: rydex_web
    ports:
      - "3000:3000"
    env_file:
      - ./rydex/.env.local
    environment:
      # Ensure Next.js knows the socket server URL within the docker network
      # or from the host perspective depending on how users access it.
      # For local dev via localhost, we keep it as localhost:8000
      - NEXT_PUBLIC_SOCKET_SERVER=http://localhost:8000
    depends_on:
      - socket
    restart: unless-stopped

  socket:
    build:
      context: ./socketServer
      dockerfile: Dockerfile
    container_name: rydex_socket
    ports:
      - "8000:8000"
    env_file:
      - ./socketServer/.env
    environment:
      # Explicitly set port
      - PORT=8000
    restart: unless-stopped
