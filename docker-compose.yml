version: '3.8'

services:
  web:
    build:
      context: ./rydex
      dockerfile: Dockerfile
    container_name: rydex_web
    ports:
      - "3000:3000"
    env_file:
      - ./rydex/.env.local
    environment:
      # Explicitly set the base URLs to localhost so NextAuth and Next.js don't redirect to 0.0.0.0
      - AUTH_URL=http://localhost:3000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_SOCKET_SERVER=http://localhost:8000
    depends_on:
      - socket
    restart: unless-stopped

  socket:
    build:
      context: ./socketServer
      dockerfile: Dockerfile
    container_name: rydex_socket
    ports:
      - "8000:8000"
    env_file:
      - ./socketServer/.env
    environment:
      # Explicitly set port
      - PORT=8000
    restart: unless-stopped
