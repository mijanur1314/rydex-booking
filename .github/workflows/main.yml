name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'rydex/package-lock.json'

    - name: Install Dependencies (Next.js)
      working-directory: ./rydex
      run: npm ci

    # - name: Run Linter
    #   working-directory: ./rydex
    #   run: npm run lint

    - name: Run Tests
      working-directory: ./rydex
      run: npm test

    - name: Install Dependencies (Socket Server)
      working-directory: ./socketServer
      run: npm install
